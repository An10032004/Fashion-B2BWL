# Thông tin ứng dụng
spring.application.name=Fashion B2BWL Backend
# Nạp file .env ở thư mục gốc dự án (cùng cấp pom.xml) — optional: không có file vẫn chạy được.
spring.config.import=optional:file:.env[.properties]

# ===============================
# CẤU HÌNH KẾT NỐI MYSQL
# ===============================
spring.datasource.url=jdbc:mysql://localhost:3306/fashion_b2bwl?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
# Thay 'root' và 'password_cua_ban' bằng tài khoản MySQL trên máy bạn
spring.datasource.username=root
spring.datasource.password=1234
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ===============================
# CẤU HÌNH HIBERNATE / JPA
# ===============================
# 'update': Tự động tạo bảng/cột mới nếu chưa có, giữ nguyên data cũ
spring.jpa.hibernate.ddl-auto=update

# In câu lệnh SQL ra console để dễ debug
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# Hibernate tự nhận diện MySQL dialect (không cần khai báo thủ công)

# ===============================
# CẤU HÌNH JACKSON (Xử lý JSON)
# ===============================
# Jackson 3.x (Spring Boot 4.x) — không cần write-dates-as-timestamps
spring.jackson.time-zone=Asia/Ho_Chi_Minh

# ===============================
# CẤU HÌNH AI ASSISTANT
# ===============================
# API key: KHÔNG commit key thật — Google đã khóa key từng lộ trong repo ("leaked"). Dùng biến môi trường GOOGLE_AI_API_KEY.
google.ai.api-key=${GOOGLE_AI_API_KEY:}

# URL generateContent — Luxe Assistant (ưu tiên) + AiSync. Ví dụ: gemini-2.5-flash, gemini-2.5-flash-lite, gemini-flash-latest.
google.ai.url=https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash:generateContent


# ===============================
# Net Term / công nợ (storefront)
# ===============================
# true: bật API debt-summary, chặn đặt hàng khi quá hạn. false: tắt (dùng cấu hình/flow riêng sau).
app.net-term.debt-check.enabled=true

# User id nhận tin nhắn khi khách báo thanh toán công nợ (mặc định 1 — cùng logic trang Tin nhắn admin).
app.admin.inbox-user-id=1

# ===============================
# Cloudinary (ký upload phía server — không đưa api_secret lên Angular)
# ===============================
app.cloudinary.cloud-name=dhv1c6tj5
# Biến môi trường (PowerShell: $env:CLOUDINARY_API_KEY="..." ; hoặc APP_CLOUDINARY_API_KEY theo relaxed binding của Spring Boot)
app.cloudinary.api-key=${CLOUDINARY_API_KEY:${APP_CLOUDINARY_API_KEY:}}
app.cloudinary.api-secret=${CLOUDINARY_API_SECRET:${APP_CLOUDINARY_API_SECRET:}}
# Thư mục tùy chọn trên Cloudinary (vd: fashion/products)
app.cloudinary.upload-folder=fashion/products

# ===============================
# Đặt lại mật khẩu — gửi mail qua Resend (HTTP, không SMTP): https://resend.com → API Keys
# ===============================
app.frontend.base-url=http://localhost:4000
# Không dùng ${ResendAPIKey} — Spring không đọc .env mặc định; dùng RESEND_API_KEY hoặc APP_MAIL_RESEND_API_KEY (export / Run Configuration IDE).
app.mail.resend.api-key=${RESEND_API_KEY:${APP_MAIL_RESEND_API_KEY:}}
# Email gửi đi (Resend test: onboarding@resend.dev ; production: domain đã verify)
app.mail.resend.from=onboarding@resend.dev